<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Tech | Premium Electronics Store</title>
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    <header>
        <div class="navbar">
            <h1 class="logo">NEXUS TECH</h1>
            <button class="cart-toggle-btn" onclick="toggleCart()">🛒 Cart (<span id="cart-counter">0</span>)</button>
        </div>
    </header>
    <main class="store-container">
        <h2>Featured Products</h2>
        <div id="product-grid" class="product-grid"></div>
    </main>
    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3>Your Shopping Cart</h3>
            <button class="close-btn" onclick="toggleCart()">✕</button>
        </div>
        <div id="cart-items-container" class="cart-items-container"></div>
        <div class="cart-footer">
            <div class="total-row"><span>Total:</span><span id="cart-total-price">₹0.00</span></div>
            <button class="checkout-btn" onclick="submitCheckout()">Proceed to Purchase</button>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
